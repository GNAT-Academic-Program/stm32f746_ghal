# ----------------------------------------------------------------------------
# Clock configuration variables
#
# Values reflect the STM32F746 clock tree (RM0385). The main PLL feeds
# SYSCLK from its P output; the VCO input (HSx / PLL_M) must sit in the
# 1-2 MHz window and the VCO output (* PLL_N) in 100-432 MHz.
#
# Consumers (e.g. Clock_Tree) read these via the Alire-generated
# stm32f746_Config package.
# ----------------------------------------------------------------------------

[configuration.variables]
SYSCLK_Src = { type = "Enum",    values = ["HSI", "HSE", "PLLCLK"],                         default = "HSI"   }
PLL_Src    = { type = "Enum",    values = ["HSI", "HSE"],                                   default = "HSI"   }
HSE_Hz     = { type = "Integer", first  = 0,   last = 26_000_000,                          default = 0       }
PLL_M_Div  = { type = "Integer", first  = 2,   last = 63,                                  default = 16      }
PLL_N_Mul  = { type = "Integer", first  = 50,  last = 432,                                 default = 192     }
PLL_P_Div  = { type = "Enum",    values = ["DIV2", "DIV4", "DIV6", "DIV8"],                default = "DIV2"  }
PLL_Q_Div  = { type = "Integer", first  = 2,   last = 15,                                  default = 4       }
AHB_Pre    = { type = "Enum",    values = ["DIV1", "DIV2", "DIV4", "DIV8", "DIV16",
                                           "DIV64", "DIV128", "DIV256", "DIV512"],          default = "DIV1"  }
APB1_Pre   = { type = "Enum",    values = ["DIV1", "DIV2", "DIV4", "DIV8", "DIV16"],        default = "DIV4"  }
APB2_Pre   = { type = "Enum",    values = ["DIV1", "DIV2", "DIV4", "DIV8", "DIV16"],        default = "DIV2"  }

[[depends-on]]
gnatprove = "^15.1.0"
